name: Auto Update README Table

on:
  push:
    branches:
      - master
      - main
    # Chỉ chạy khi có sự thay đổi trong các thư mục bài tập hoặc file script
    paths-ignore:
      - 'README.md' 

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Lấy toàn bộ lịch sử để tránh lỗi khi commit

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run Python script
        run: python update_readme.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add README.md
          # Chỉ commit nếu có sự thay đổi thực sự trong README
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: Auto-update README table [skip ci]" && git push)
